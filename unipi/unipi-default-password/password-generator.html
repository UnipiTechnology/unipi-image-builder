<script>

// 64-bit operations using hi/lo pairs
function add64 (a, b) {
  const lo = (a.lo + b.lo) >>> 0
  const hi = (a.hi + b.hi + (lo < a.lo ? 1 : 0)) >>> 0
  return { hi, lo }
}

function rotr (x, n) {
  if (n < 32) {
    return {
      hi: ((x.hi >>> n) | (x.lo << (32 - n))) >>> 0,
      lo: ((x.lo >>> n) | (x.hi << (32 - n))) >>> 0
    }
  }
  n -= 32
  return {
    hi: ((x.lo >>> n) | (x.hi << (32 - n))) >>> 0,
    lo: ((x.hi >>> n) | (x.lo << (32 - n))) >>> 0
  }
}

function shr (x, n) {
  if (n < 32) {
    return {
      hi: (x.hi >>> n) >>> 0,
      lo: ((x.lo >>> n) | (x.hi << (32 - n))) >>> 0
    }
  }
  return {
    hi: 0,
    lo: x.hi >>> (n - 32)
  }
}


function xor64 (a, b) {
  return {
    hi: (a.hi ^ b.hi) >>> 0,
    lo: (a.lo ^ b.lo) >>> 0
  };
}

function and64 (a, b) {
  return {
    hi: (a.hi & b.hi) >>> 0,
    lo: (a.lo & b.lo) >>> 0
  };
}

function not64 (a) {
  return {
    hi: (~a.hi) >>> 0,
    lo: (~a.lo) >>> 0
  };
}


function ch (x, y, z) {
  return xor64(and64(x, y), and64(not64(x), z))
}

function maj (x, y, z) {
  return xor64(xor64(and64(x, y), and64(x, z)), and64(y, z))
}

function sigma0 (x) {
  return xor64(xor64(rotr(x, 1), rotr(x, 8)), shr(x, 7))
}

function sigma1 (x) {
  return xor64(xor64(rotr(x, 19), rotr(x, 61)), shr(x, 6))
}

function Sigma0 (x) {
  return xor64(xor64(rotr(x, 28), rotr(x, 34)), rotr(x, 39))
}

function Sigma1 (x) {
  return xor64(xor64(rotr(x, 14), rotr(x, 18)), rotr(x, 41))
}

function toHex (words) {
  return words.map(w =>
    w.hi.toString(16).padStart(8, '0') +
    w.lo.toString(16).padStart(8, '0')
  ).join('')
}

function sha512Bytes (msg) {
  const l = msg.length * 8

  const withOne = new Uint8Array(((msg.length + 17 + 127) >> 7) << 7)
  withOne.set(msg)
  withOne[msg.length] = 0x80


  const view = new DataView(withOne.buffer)

  // high 64 bits = 0 (because JS strings won't hit 2^64)
  view.setUint32(withOne.length - 16, 0)
  view.setUint32(withOne.length - 12, 0)

  // low 64 bits = bit length
  view.setUint32(withOne.length - 8, Math.floor(l / 0x100000000))
  view.setUint32(withOne.length - 4, l >>> 0)


  let H = [
    { hi: 0x6a09e667, lo: 0xf3bcc908 },
    { hi: 0xbb67ae85, lo: 0x84caa73b },
    { hi: 0x3c6ef372, lo: 0xfe94f82b },
    { hi: 0xa54ff53a, lo: 0x5f1d36f1 },
    { hi: 0x510e527f, lo: 0xade682d1 },
    { hi: 0x9b05688c, lo: 0x2b3e6c1f },
    { hi: 0x1f83d9ab, lo: 0xfb41bd6b },
    { hi: 0x5be0cd19, lo: 0x137e2179 }
  ]

  const W = new Array(80)

  for (let i = 0; i < withOne.length; i += 128) {
    for (let t = 0; t < 16; t++) {
      const offset = i + t * 8
      W[t] = {
        hi: view.getUint32(offset),
        lo: view.getUint32(offset + 4)
      }
    }

    for (let t = 16; t < 80; t++) {
      W[t] = add64(add64(add64(
        sigma1(W[t - 2]),
        W[t - 7]
      ), sigma0(W[t - 15])), W[t - 16])
    }

    let [a, b, c, d, e, f, g, h] = H

    for (let t = 0; t < 80; t++) {
      const T1 = add64(
        add64(
          add64(h, Sigma1(e)),
          ch(e, f, g)
        ),
        add64(K64[t], W[t])
      )


      const T2 = add64(Sigma0(a), maj(a, b, c))

      h = g
      g = f
      f = e
      e = add64(d, T1)
      d = c
      c = b
      b = a
      a = add64(T1, T2)
    }

    H = [
      add64(H[0], a),
      add64(H[1], b),
      add64(H[2], c),
      add64(H[3], d),
      add64(H[4], e),
      add64(H[5], f),
      add64(H[6], g),
      add64(H[7], h)
    ]
  }

  return toHex(H)
}

function sha512 (str) {
  return sha512Bytes(new TextEncoder().encode(str));

<script>
// ---- helpers ----

function hexToBytes (hex) {
  const out = new Uint8Array(hex.length / 2);

  for (let i = 0; i < out.length; i++) {
    out[i] = parseInt(hex.substr(i * 2, 2), 16);
  }

  return out;
}

function bytesToHex (bytes) {
  let out = '';

  for (let i = 0; i < bytes.length; i++) {
    out += bytes[i].toString(16).padStart(2, '0');
  }

  return out;
}

function concatBytes (a, b) {
  const out = new Uint8Array(a.length + b.length);
  out.set(a);
  out.set(b, a.length);
  return out;
}

// ---- HMAC-SHA512 ----

function hmacSha512 (keyBytes, msgBytes) {
  const blockSize = 128; // SHA-512 block size

  let key = keyBytes;

  if (key.length > blockSize) {
    key = hexToBytes(sha512Bytes(key));
  }

  if (key.length < blockSize) {
    const padded = new Uint8Array(blockSize);
    padded.set(key);
    key = padded;
  }

  const oKeyPad = new Uint8Array(blockSize);
  const iKeyPad = new Uint8Array(blockSize);

  for (let i = 0; i < blockSize; i++) {
    oKeyPad[i] = key[i] ^ 0x5c;
    iKeyPad[i] = key[i] ^ 0x36;
  }

  const inner = sha512Bytes(concatBytes(iKeyPad, msgBytes));


  const outer = sha512Bytes(concatBytes(oKeyPad, hexToBytes(inner)));
  return outer;
}

// ---- testHMAC runner ----

function testHMAC (name, keyHex, msg, expectedHex) {
  const key = hexToBytes(keyHex);
  const msgBytes = typeof msg === 'string' ? new TextEncoder().encode(msg) : msg;

  const result = hmacSha512(key, msgBytes);

  const ok = result.startsWith(expectedHex.toLowerCase());

  console.log(name + ': ' + (ok ? 'OK' : 'FAIL'));

  if (!ok) {
    console.log(' expected:', expectedHex);
    console.log(' got     :', result);
  }
}

<script>
// crypt base64
const CRYPT64 = './0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';

function b64From24Bit (b2, b1, b0, count) {
  let w = (b2 << 16) | (b1 << 8) | b0;
  let out = '';

  while (count-- > 0) {
    out += CRYPT64[w & 0x3f];
    w >>>= 6;
  }

  return out;
}

// helpers
function repeatBytes (bytes, count) {
  const out = new Uint8Array(bytes.length * count);

  for (let i = 0; i < count; i++) {
    out.set(bytes, i * bytes.length);
  }

  return out;
}

function concatBytes (...arrays) {
  let len = 0;

  for (const a of arrays) {
    len += a.length;
  }

  const out = new Uint8Array(len);

  let pos = 0;

  for (const a of arrays) {
    out.set(a, pos);
    pos += a.length;
  }

  return out;
}

function sha512crypt (password, salt, rounds = 5000) {
  const pwd = new TextEncoder().encode(password);
  salt = salt.slice(0,16);
  const saltBytes = new TextEncoder().encode(salt);

  //alternate sum
  const alt = hexToBytes(sha512Bytes(
    concatBytes(
      pwd,
      saltBytes,
      pwd
    ))
  );

  //prepate intermediate0 sum
  let ctx = concatBytes(
    pwd,
    saltBytes
  );

  let pwdLen = pwd.length;

  while (pwdLen > 64) {
    ctx = concatBytes(ctx, alt);
    pwdLen -= 64;
  }

  ctx = concatBytes(
    ctx,
    alt.slice(0, pwdLen)
  );

  pwdLen = pwd.length;

  while (pwdLen != 0) {
    if (pwdLen & 1) {
      ctx = concatBytes(ctx, alt);
    } else {
      ctx = concatBytes(ctx, pwd);
    }

    pwdLen >>= 1;
  }

  //hash intermediate0 sum
  let A = hexToBytes(sha512Bytes(ctx));

  //p sequence
  let pTmp = new Uint8Array(0);

  for (let i = 0; i < pwd.length; i++) {
    pTmp = concatBytes(pTmp, pwd);
  }

  const pDigest = hexToBytes(sha512Bytes(pTmp));

  const P = repeatBytes(
    pDigest,
    Math.ceil(pwd.length / pDigest.length)
  ).slice(0, pwd.length);

  //s sequence
  let sTmp = new Uint8Array(0);

  for (let i = 0; i < 16 + A[0]; i++) {
    sTmp = concatBytes(sTmp, saltBytes);
  }

  const sDigest = hexToBytes(sha512Bytes(sTmp));

  const S = repeatBytes(
    sDigest,
    Math.ceil(saltBytes.length / sDigest.length)
  ).slice(0, saltBytes.length);

  //rounds
  // A = intermediateIi
  // P = P bytes
  // S = S bytes
  for (let i = 0; i < rounds; i++) {
    let roundBuf = new Uint8Array(0);

    if (i & 1) {
      roundBuf = concatBytes(roundBuf, P);
    } else {
      roundBuf = concatBytes(roundBuf, A);
    }

    if (i % 3 !== 0) {
      roundBuf = concatBytes(roundBuf, S);
    }

    if (i % 7 !== 0) {
      roundBuf = concatBytes(roundBuf, P);
    }

    if (i & 1) {
      roundBuf = concatBytes(roundBuf, A);
    } else {
      roundBuf = concatBytes(roundBuf, P);
    }

    A = hexToBytes(sha512Bytes(roundBuf));
  }

  //A = final sum

  //output encoding
  const perm = [
    [0, 21, 42, 4],
    [22, 43, 1, 4],
    [44, 2, 23, 4],
    [3, 24, 45, 4],
    [25, 46, 4, 4],
    [47, 5, 26, 4],
    [6, 27, 48, 4],
    [28, 49, 7, 4],
    [50, 8, 29, 4],
    [9, 30, 51, 4],
    [31, 52, 10, 4],
    [53, 11, 32, 4],
    [12, 33, 54, 4],
    [34, 55, 13, 4],
    [56, 14, 35, 4],
    [15, 36, 57, 4],
    [37, 58, 16, 4],
    [59, 17, 38, 4],
    [18, 39, 60, 4],
    [40, 61, 19, 4],
    [62, 20, 41, 4]
  ];

  let encoded = '';

  for (const [a, b, c, n] of perm) {
    encoded += b64From24Bit(
      A[a],
      A[b],
      A[c],
      n
    );
  }

  encoded += b64From24Bit(
    0,
    0,
    A[63],
    2
  );

  return `$6$` + (rounds == 5000 ? `` : `rounds=${rounds}$`) + `${salt}$${encoded}`;
}

</script>
<!-- SHA512crypt tests -->
<script>
  function assertEqual (name, expected, actual) {
  if (expected === actual) {
    console.log(name + ': OK');
    return true;
  }

  console.error(name + ': FAIL');
  console.error(' expected:', expected);
  console.error(' got     :', actual);

  return false;
}

function testSha512Crypt () {
  const vectors = [
    {
      password: '',
      salt: 'saltstring',
      rounds: 5000,
      expected:
        '$6$saltstring$kyGrqt6gmjAdtFLPrflEFifSYLCWWq1pyx95SvqinLDy2UHmj0sTF0MSLMwxPFZc3tu5kQckI8fks0zOPda3n1'
    },
    {
      password: 'Hello world!',
      salt: 'saltstring',
      rounds: 5000,
      expected:
        '$6$saltstring$svn8UoSVapNtMuq1ukKS4tPQd8iKwSMHWjl/O817G3uBnIFNjnQJuesI68u4OTLiBFdcbYEdFCoEOfaS35inz1'
    },
    {
      password: 'Hello world!',
      salt: 'saltstring',
      rounds: 10000,
      expected:
        '$6$rounds=10000$saltstring$buk9gc9MDdd3Z11.ZzxK8sKnFNbxNdTnCf.XHjjiTHcgFuFgkKvBQPLIaUn4Ixl3TLN8ZgCk52MPgbWjATwhH0'
    },
    {
      password: 'This is just a test',
      salt: 'toolongsaltstring',
      rounds: 5000,
      expected:
        '$6$toolongsaltstrin$lQ8jolhgVRVhY4b5pZKaysCLi0QBxGoNeKQzQ3glMhwllF7oGDZxUhx1yxdYcz/e1JSbq3y6JMxxl8audkUEm0'
    },
    {
      password: 'a very much longer text to encrypt.  This one even stretches over morethan one block.',
      salt: 'toolongsaltstring',
      rounds: 5000,
      expected:
        '$6$toolongsaltstrin$VFZszF9clxssBvB5LJmip092ixoS6uxrz2/ukMcF9AHpAvjADmgHVtunsT7xIvF844tjknZX4LBnY0oFlisns/'
    }
  ];

  let passed = 0;

  for (const v of vectors) {
    const result = sha512crypt(
      v.password,
      v.salt,
      v.rounds
    );

    if (assertEqual(v.expected, v.expected, result)) {
      passed++;
    }
  }

  console.log('');
  console.log(`Passed ${passed}/${vectors.length} tests`);
}
</script>

<!-- generate random salt -->
<script>
  function generateSalt (length = 16) {
    const random = new Uint8Array(length);
    crypto.getRandomValues(random);

    let salt = '';

    for (let i = 0; i < length; i++) {
      salt += CRYPT64[random[i] & 63];
    }

    return salt;
  }
  
  function sha512cryptAutoSalt (password, rounds = 5000) {
    const salt = generateSalt(16);

    return sha512crypt(
      password,
      salt,
      rounds
    );
  }
</script>
<script>
function validatePassword (password) {
  let out = "";
  if (password.length < 8) {
    out += 'Password must contain at least 8 characters.\n';
  }

  if (!/[0-9]/.test(password)) {
    out += 'Password must contain at least one digit.\n';
  }

  if (!/[^A-Za-z0-9]/.test(password)) {
    out += 'Password must contain at least one special character.\n';
  }

  if (out === "") {out = null};
  return out;
}

async function copyToClipboard (text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch (err) {
    const temp = document.createElement('textarea');

    temp.value = text;
    document.body.appendChild(temp);

    temp.select();
    document.execCommand('copy');

    document.body.removeChild(temp);
  }
}

function downloadHash (hash) {
  const blob = new Blob(
    [hash + '\n']
  );

  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');

  a.href = url;
  a.download = 'PWD_HASH_USER';

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

document
  .getElementById('generateBtn')
  .addEventListener('click', () => {
    const password = document
      .getElementById('passwordInput')
      .value;

    const error = validatePassword(password);

    if (error) {
      alert(error);
      return;
    }

    const hash = sha512cryptAutoSalt(password);

    document.getElementById('hashOutput').value = hash;
  });

document
  .getElementById('copyBtn')
  .addEventListener('click', () => {
    const hash = document
      .getElementById('hashOutput')
      .value;

    if (!hash) {
      return;
    }

    copyToClipboard(hash);
  });

document
  .getElementById('downloadBtn')
  .addEventListener('click', () => {
    const hash = document
      .getElementById('hashOutput')
      .value;

    if (!hash) {
      return;
    }

    downloadHash(hash);
  });
  
function showPasswd() {
  let el = document.getElementById("passwordInput");
  if (el.type === "password") {
    el.type = "text";
  } else {
    el.type = "password";
  }
} 
  
</script>
